<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        
        .red-glow-btn { background-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); transition: all 0.3s ease; }
        .red-glow-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); }

        .menu-card { background: #111111; border: 1px solid #1a1a1a; transition: all 0.2s ease; cursor: pointer; }
        .menu-card:hover { background: #161616; border-color: #333; transform: translateX(5px); }

        .tool-card { background: #111111; border: 1px solid #1a1a1a; border-radius: 24px; padding: 2.5rem; }
        .icon-box { background: #1a1a1a; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; color: #666; }
        
        .btn-k { background: #ff5c5c; border-radius: 12px; font-weight: 900; color: white; transition: 0.2s; }
        .btn-us { background: #3b82f6; border-radius: 12px; font-weight: 900; color: white; transition: 0.2s; }
        .btn-ac { background: #00d1b2; border-radius: 12px; font-weight: 900; color: #000; transition: 0.2s; }
        
        .option-btn { background: #1a1a1a; border: 1px solid #333; padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; color: #888; }
        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        
        [x-cloak] { display: none !important; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        <button @click="openMenu = true" class="w-11 h-11 flex items-center justify-center bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition">
            <i class="fa-solid fa-bars-staggered text-xl text-white"></i>
        </button>
    </nav>

    <main class="min-h-screen pt-32 pb-20 px-6">
        
        <template x-if="view === 'home'">
            <section class="flex flex-col items-center justify-center text-center py-20 animate-fade">
                <h1 class="text-6xl md:text-[90px] font-black leading-tight mb-6 tracking-tighter uppercase" x-html="t.heroTitle"></h1>
                <p class="text-gray-500 max-w-xl mb-12 text-lg font-medium" x-text="t.heroSub"></p>
                <div class="flex flex-col md:flex-row gap-5">
                    <button @click="view = 'products'" class="red-glow-btn px-12 py-4 rounded-2xl font-black text-lg uppercase" x-text="t.browseBtn"></button>
                    <button @click="view = 'converter'" class="bg-white/5 border border-white/10 px-12 py-4 rounded-2xl font-black text-lg hover:bg-white/10 transition uppercase">Link Converter</button>
                </div>
            </section>
        </template>

        <template x-if="view === 'products'">
            <section class="max-w-7xl mx-auto animate-fade">
                <h2 class="text-4xl font-black uppercase mb-12"><span x-text="t.latest"></span> <span class="text-red-600">Finds</span></h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <template x-for="product in products">
                        <div class="menu-card p-4 rounded-[2.5rem] flex flex-col group">
                            <div class="relative aspect-square mb-6 overflow-hidden rounded-[2rem] bg-[#0c0c0c]">
                                <img :src="product.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-4 right-4 bg-black/80 backdrop-blur-md px-4 py-2 rounded-full text-sm font-black text-red-500 border border-white/10" 
                                     x-text="formatPrice(product.priceUSD)"></div>
                            </div>
                            <h3 class="font-bold text-lg mb-6 px-2 truncate" x-text="product.name"></h3>
                            <div class="grid grid-cols-2 gap-3 px-1">
                                <button @click="openConverted(product.url)" class="btn-k py-3 flex items-center justify-center text-[10px] uppercase">Kakobuy</button>
                                <button @click="openConverted(product.url)" class="btn-us py-3 flex items-center justify-center text-[10px] uppercase">USFans</button>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </template>

        <template x-if="view === 'converter'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="tool-card">
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fa-solid fa-robot text-red-600 text-2xl"></i>
                        <h2 class="text-3xl font-black uppercase tracking-tighter" x-text="t.convTitle"></h2>
                    </div>
                    <p class="text-gray-500 mb-8 font-medium" x-text="t.convDesc"></p>
                    <input type="text" x-model="inputUrl" @keyup.enter="autoFetch()" :placeholder="t.convPlace" class="w-full p-5 rounded-2xl mb-4 text-lg">
                    <button @click="autoFetch()" class="red-glow-btn w-full py-5 uppercase font-black rounded-xl" x-text="t.checkBtn"></button>
                </div>
            </section>
        </template>

        <template x-if="view === 'product_page' && activeItem">
            <section class="max-w-4xl mx-auto animate-fade space-y-8">
                <div class="tool-card">
                    <div class="relative aspect-square max-h-[400px] mx-auto mb-8 rounded-2xl overflow-hidden bg-black flex items-center justify-center border border-white/5">
                        <img :src="activeItem.image" class="w-full h-full object-contain">
                    </div>
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div class="max-w-md">
                            <h2 class="text-2xl font-black uppercase leading-tight" x-text="activeItem.name"></h2>
                            <p class="text-4xl font-black text-red-600 mt-2" x-text="formatPrice(activeItem.priceUSD)"></p>
                        </div>
                        <div class="flex gap-3 w-full md:w-auto">
                            <a :href="activeItem.links.usf" target="_blank" class="flex-1 bg-white text-black px-8 py-4 rounded-xl font-black flex items-center justify-center gap-2 uppercase text-xs">
                                Order on USFans
                            </a>
                            <button @click="navigator.clipboard.writeText(activeItem.originalUrl); alert('Link skopiowany!')" class="bg-white/5 p-4 rounded-xl border border-white/10"><i class="fa-solid fa-link"></i></button>
                        </div>
                    </div>
                </div>

                <div class="tool-card">
                    <div class="flex items-center gap-3 mb-6">
                        <i class="fa-solid fa-camera text-red-600"></i>
                        <h3 class="text-xl font-black uppercase">Warehouse QC</h3>
                    </div>
                    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                        <template x-for="img in activeItem.qc">
                            <div class="aspect-square rounded-xl bg-white/5 overflow-hidden border border-white/5 hover:border-red-600 transition cursor-pointer" @click="window.open(img)">
                                <img :src="img" class="w-full h-full object-cover">
                            </div>
                        </template>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <a :href="activeItem.links.kako" target="_blank" class="btn-k p-5 flex justify-between items-center group"><span class="uppercase font-black text-sm">Kakobuy</span><i class="fa-solid fa-arrow-right"></i></a>
                    <a :href="activeItem.links.usf" target="_blank" class="btn-us p-5 flex justify-between items-center group"><span class="uppercase font-black text-sm">USFans</span><i class="fa-solid fa-arrow-right"></i></a>
                    <a :href="activeItem.links.acb" target="_blank" class="btn-ac p-5 flex justify-between items-center group"><span class="uppercase font-black text-sm">ACBuy</span><i class="fa-solid fa-arrow-right"></i></a>
                </div>
            </section>
        </template>

        <template x-if="view === 'qc'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="tool-card text-center">
                    <i class="fa-solid fa-camera text-red-600 text-4xl mb-4"></i>
                    <h2 class="text-3xl font-black mb-2 uppercase" x-text="t.qcTitle"></h2>
                    <p class="text-gray-500 mb-8" x-text="t.qcDesc"></p>
                    <input type="text" x-model="qcUrl" :placeholder="t.convPlace" class="w-full p-5 rounded-2xl mb-8 text-lg">
                    <button @click="inputUrl = qcUrl; autoFetch()" class="red-glow-btn py-5 px-10 rounded-xl w-full font-black uppercase" x-text="t.checkBtn"></button>
                </div>
            </section>
        </template>

        <template x-if="view === 'calculator'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="tool-card">
                    <h2 class="text-3xl font-black mb-6 uppercase text-red-600">Ship Calculator</h2>
                    <div class="mb-10">
                        <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 px-1">Waga / Weight (Gramy)</label>
                        <input type="number" x-model="weight" placeholder="4000" class="w-full p-5 rounded-2xl text-xl font-bold transition">
                    </div>
                    <div class="grid grid-cols-1 gap-4" x-show="weight > 0" x-cloak>
                        <div class="bg-white/5 p-6 rounded-3xl border border-white/5 flex justify-between items-center">
                            <span class="font-black uppercase text-xs">Kakobuy Est.</span>
                            <span class="text-2xl font-black text-red-500" x-text="calcShipping(weight, 'kakobuy')"></span>
                        </div>
                        <div class="bg-white/5 p-6 rounded-3xl border border-white/5 flex justify-between items-center">
                            <span class="font-black uppercase text-xs">USFans Est.</span>
                            <span class="text-2xl font-black text-blue-500" x-text="calcShipping(weight, 'usfans')"></span>
                        </div>
                    </div>
                </div>
            </section>
        </template>
    </main>

    <div x-show="openMenu" class="fixed inset-0 z-[100]" x-cloak>
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="openMenu = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:w-[400px] bg-[#080808] p-8 shadow-2xl border-l border-white/5 overflow-y-auto" x-transition>
            <div class="flex justify-between items-center mb-10 text-white">
                <h2 class="text-2xl font-black uppercase">Menu</h2>
                <button @click="openMenu = false" class="w-10 h-10 bg-white/5 rounded-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="space-y-3 mb-10">
                <div @click="view = 'products'; openMenu = false" class="menu-card p-4 rounded-2xl flex items-center gap-4 text-white"><div class="icon-box"><i class="fa-solid fa-magnifying-glass"></i></div><span class="font-bold uppercase text-xs">Browse Finds</span></div>
                <div @click="view = 'converter'; openMenu = false" class="menu-card p-4 rounded-2xl flex items-center gap-4 text-white"><div class="icon-box"><i class="fa-solid fa-robot"></i></div><span class="font-bold uppercase text-xs">Link Converter</span></div>
                <div @click="view = 'qc'; openMenu = false" class="menu-card p-4 rounded-2xl flex items-center gap-4 text-white"><div class="icon-box"><i class="fa-solid fa-camera"></i></div><span class="font-bold uppercase text-xs">Quality Checks</span></div>
                <div @click="view = 'calculator'; openMenu = false" class="menu-card p-4 rounded-2xl flex items-center gap-4 text-white"><div class="icon-box"><i class="fa-solid fa-calculator"></i></div><span class="font-bold uppercase text-xs">Ship Calculator</span></div>
                <a :href="discordLink" target="_blank" class="menu-card p-4 rounded-2xl flex items-center gap-4 border-red-600/30 bg-red-600/5 text-white"><div class="icon-box !text-red-500"><i class="fa-brands fa-discord"></i></div><span class="font-bold uppercase text-xs">Discord</span></a>
            </div>

            <div class="border-t border-white/5 pt-8 text-white">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-4" x-text="t.settings"></h3>
                <div class="grid grid-cols-2 gap-3">
                    <button @click="toggleLang()" class="bg-white/5 p-4 rounded-xl text-[10px] font-black border border-white/10 uppercase" x-text="lang === 'PL' ? 'Język: PL' : 'Language: EN'"></button>
                    <button @click="toggleCurrency()" class="bg-white/5 p-4 rounded-xl text-[10px] font-black border border-white/10 uppercase" x-text="currency"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function siteHandler() {
            return {
                view: 'home', openMenu: false, lang: 'PL', currency: 'PLN', inputUrl: '', qcUrl: '', weight: '',
                activeItem: null,
                discordLink: 'https://discord.gg/DTb5mkpNuH',
                aff: { kakobuy: 'maksr3ps', usfans: 'DJPZ6T', acbuy: 'KV2WLD' },
                t: {},
                translations: {
                    PL: { 
                        heroTitle: 'Premium<br><span class="text-red-600">Rep</span> Tools', 
                        heroSub: 'Najlepsze znaleziska i zaawansowane narzędzia dla społeczności Reps.',
                        browseBtn: 'Przeglądaj Sklep', 
                        latest: 'Najnowsze',
                        convTitle: 'Link Converter',
                        convDesc: 'Wklej link, aby automatycznie pobrać dane i QC.',
                        convPlace: 'Wklej link Taobao/Weidian...',
                        checkBtn: 'Sprawdź Produkt',
                        qcTitle: 'Quality Checks',
                        qcDesc: 'Podejrzyj zdjęcia z magazynu.',
                        settings: 'Ustawienia'
                    },
                    EN: { 
                        heroTitle: 'Premium<br><span class="text-red-600">Rep</span> Tools', 
                        heroSub: 'The best finds and advanced tools for the Reps community.',
                        browseBtn: 'Browse Store', 
                        latest: 'Latest',
                        convTitle: 'Link Converter',
                        convDesc: 'Paste a link to auto-fetch product data and QC.',
                        convPlace: 'Paste Taobao/Weidian link...',
                        checkBtn: 'Check Product',
                        qcTitle: 'Quality Checks',
                        qcDesc: 'Preview warehouse photos.',
                        settings: 'Settings'
                    }
                },
                products: [
                    { name: "Numeris", priceUSD: "45", image: "https://file.uufinds.com/product/2026/04/15/2044313412956188673/major/2c92808a9d6ac29f019d8fffa56c38c0.webp", url: "https://weidian.com/item.html?itemID=7614479098" },
                    { name: "ADWYSD Pants", priceUSD: "11", image: "https://photos.pandalabs.io/aj4-black-cat.jpg", url: "https://weidian.com/item.html?itemID=915690707683" }
                ],

                init() { this.t = this.translations[this.lang]; },
                toggleLang() { this.lang = this.lang === 'PL' ? 'EN' : 'PL'; this.t = this.translations[this.lang]; },
                toggleCurrency() { this.currency = this.currency === 'PLN' ? 'USD' : 'PLN'; },

                formatPrice(usd) {
                    if (this.currency === 'PLN') return Math.round(usd * 4) + ' PLN';
                    return '$' + usd;
                },

                calcShipping(g, agent) {
                    let priceUSD = agent === 'kakobuy' ? (10 + (g/1000 * 12)) : (8 + (g/1000 * 11));
                    if (this.currency === 'PLN') return Math.round(priceUSD * 4) + ' PLN';
                    return '$' + Math.round(priceUSD);
                },

                autoFetch() {
                    let url = this.inputUrl.trim();
                    if (!url) return;

                    // EKSTRAKCJA NAZWY Z LINKU
                    let cleanName = "Product from Link";
                    try {
                        if (url.includes("itemID=")) {
                            let id = url.match(/itemID=(\d+)/)[1];
                            cleanName = "WEIDIAN ITEM #" + id;
                        } else if (url.includes("id=")) {
                            let id = url.match(/id=(\d+)/)[1];
                            cleanName = "TAOBAO ITEM #" + id;
                        }
                    } catch(e) {}

                    this.activeItem = {
                        name: cleanName,
                        priceUSD: "25", // Przykładowa cena (w realnym API byłaby dynamiczna)
                        image: "https://file.uufinds.com/product/2026/04/15/2044313412956188673/major/2c92808a9d6ac29f019d8fffa56c38c0.webp",
                        qc: [
                            "https://file.uufinds.com/qc/1.jpg", "https://file.uufinds.com/qc/2.jpg",
                            "https://file.uufinds.com/qc/3.jpg", "https://file.uufinds.com/qc/4.jpg"
                        ],
                        links: {
                            kako: `https://www.kakobuy.com/item/details?url=${encodeURIComponent(url)}&affcode=${this.aff.kakobuy}`,
                            usf: `https://www.usfans.com/product/1/123?ref=${this.aff.usfans}`,
                            acb: `https://m.acbuy.com/product?id=123&source=TB&inviteCode=${this.aff.acbuy}`
                        },
                        originalUrl: url
                    };

                    this.view = 'product_page';
                    this.inputUrl = '';
                },

                openConverted(url) {
                    this.inputUrl = url;
                    this.autoFetch();
                }
            }
        }
    </script>
</body>
</html>
