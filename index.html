<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; overflow-x: hidden; }
        
        .hero-title { font-size: 48px; line-height: 1.1; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        @media (min-width: 768px) { .hero-title { font-size: 80px; } }
        
        .btn-main-red { background-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); color: white; border-radius: 12px; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .btn-main-black { background-color: #111111; color: white; border: 1px solid #222; border-radius: 12px; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .btn-main-red:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); }

        .menu-sidebar { background-color: #080808; border-left: 1px solid #111; }
        .menu-tile { background-color: #111111; border: 1px solid #1a1a1a; border-radius: 16px; padding: 16px; transition: 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .menu-tile:hover { background-color: #161616; border-color: #333; }
        .menu-icon-box { background-color: #1a1a1a; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: #666; font-size: 18px; }

        .agent-btn { border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 12px; transition: 0.2s; padding: 16px; width: 100%; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn-kako { background-color: #121212; color: white; }
        .btn-usf { background-color: #121212; color: white; }
        .btn-acb { background-color: #121212; color: white; }
        
        .agent-logo { width: 24px; height: 24px; border-radius: 6px; object-fit: cover; }

        .card-dark { background: #080808; border: 1px solid #1a1a1a; border-radius: 24px; }
        .option-btn { background: #111; border: 1px solid #222; padding: 10px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; transition: 0.2s; color: #ccc; }
        .option-btn:hover { border-color: #ff0000; color: white; }

        [x-cloak] { display: none !important; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        <button @click="openMenu = true" class="w-11 h-11 flex items-center justify-center bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition text-white">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
    </nav>

    <main class="min-h-screen pt-32 pb-20 px-6">
        
        <template x-if="view === 'home'">
            <section class="flex flex-col items-center justify-center text-center py-20 animate-fade">
                <h1 class="hero-title mb-8" x-html="t.heroTitle"></h1>
                <p class="text-gray-500 max-w-xl mb-16 text-lg font-medium" x-text="t.heroSub"></p>
                <div class="flex flex-col md:flex-row gap-5 w-full max-w-sm md:max-w-none justify-center">
                    <button @click="view = 'products'" class="btn-main-red px-12 py-5 w-full md:w-auto" x-text="t.browseBtn"></button>
                    <button @click="view = 'converter'" class="btn-main-black px-12 py-5 w-full md:w-auto">Link Converter</button>
                </div>
            </section>
        </template>

        <template x-if="view === 'converter'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl text-center">
                    <h2 class="text-3xl font-black uppercase mb-4">Product <span class="text-red-600">Engine</span></h2>
                    <p class="text-gray-500 mb-8" x-text="t.convDesc"></p>
                    <div class="space-y-4">
                        <input type="text" x-model="inputUrl" @keyup.enter="processLink()" :placeholder="t.convPlace" class="w-full p-6 rounded-2xl transition text-lg border border-white/10 bg-white/5 outline-none focus:border-red-600/50">
                        <button @click="processLink()" class="btn-main-red w-full py-5 uppercase font-black">Sprawdź produkt</button>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="view === 'product' && activeItem">
            <section class="max-w-4xl mx-auto animate-fade space-y-8">
                
                <div class="card-dark p-6">
                    <div class="relative aspect-square max-h-[450px] mx-auto mb-8 rounded-2xl overflow-hidden bg-[#0c0c0c] border border-white/5 flex items-center justify-center p-4">
                        <img :src="activeItem.mainImg" class="w-full h-full object-contain">
                    </div>
                    
                    <div class="space-y-6">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span class="bg-orange-600 text-[10px] font-bold px-2 py-0.5 rounded text-white uppercase">Taobao</span>
                                <span class="text-gray-500 text-xs font-bold" x-text="activeItem.shopName"></span>
                            </div>
                            <h2 class="text-2xl md:text-3xl font-black leading-tight uppercase mb-2" x-text="activeItem.name"></h2>
                            <p class="text-4xl font-black text-white" x-text="'$' + activeItem.price"></p>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-3">
                            <a :href="activeItem.links.usf" target="_blank" class="flex-1 bg-white text-black py-4 rounded-xl font-black flex items-center justify-center gap-3 uppercase text-sm hover:bg-gray-200 transition">
                                <img src="https://i.ibb.co/v4m0fXm/usfans-logo.png" class="w-5 h-5 rounded-md"> Order product
                            </a>
                            <button @click="copyLink()" class="bg-[#111] border border-white/10 p-4 rounded-xl hover:bg-white/5 transition">
                                <i class="fa-solid fa-link"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card-dark p-6">
                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-6">Dostępne Opcje (Sizes)</h3>
                    <div class="flex flex-wrap gap-2 mb-10">
                        <template x-for="size in activeItem.sizes">
                            <button class="option-btn border-white/5" x-text="size"></button>
                        </template>
                    </div>

                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-6">Wersje (Versions)</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <template x-for="v in activeItem.versions">
                            <button class="option-btn flex items-center gap-4 text-left p-3">
                                <div class="w-12 h-12 rounded-lg bg-black flex-shrink-0 overflow-hidden border border-white/5">
                                    <img :src="activeItem.mainImg" class="w-full h-full object-cover">
                                </div>
                                <span class="truncate text-[11px] uppercase" x-text="v"></span>
                            </button>
                        </template>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="card-dark p-5 flex flex-col justify-between aspect-[1.5/1]">
                        <div class="flex items-center gap-2 text-gray-500 mb-2">
                            <i class="fa-solid fa-weight-hanging text-[10px]"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest">Weight</span>
                        </div>
                        <p class="text-2xl font-black" x-text="activeItem.weight + 'g'"></p>
                    </div>
                    <div class="card-dark p-5 flex flex-col justify-between aspect-[1.5/1]">
                        <div class="flex items-center gap-2 text-gray-500 mb-2">
                            <i class="fa-solid fa-chart-line text-[10px]"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest">Sales</span>
                        </div>
                        <p class="text-2xl font-black" x-text="activeItem.sales"></p>
                    </div>
                    <div class="card-dark p-5 flex flex-col justify-between aspect-[1.5/1]">
                        <div class="flex items-center gap-2 text-gray-500 mb-2">
                            <i class="fa-solid fa-clock text-[10px]"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest">Avg. Delivery</span>
                        </div>
                        <p class="text-2xl font-black">N/A</p>
                    </div>
                    <div class="card-dark p-5 flex flex-col justify-between aspect-[1.5/1]">
                        <div class="flex items-center gap-2 text-gray-500 mb-2">
                            <i class="fa-solid fa-cube text-[10px]"></i>
                            <span class="text-[9px] font-black uppercase tracking-widest">Volume</span>
                        </div>
                        <p class="text-[11px] font-black text-gray-400">39.0*38.0*2.0</p>
                    </div>
                </div>

                <div class="card-dark p-6">
                    <div class="flex items-center gap-3 mb-8">
                        <i class="fa-solid fa-magnifying-glass text-red-600"></i>
                        <h3 class="text-xl font-black uppercase">Quality Checks</h3>
                    </div>
                    <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
                        <template x-for="img in activeItem.qcImages">
                            <div class="aspect-square rounded-xl bg-[#0c0c0c] overflow-hidden border border-white/5 hover:border-red-600 transition-all cursor-pointer group" @click="window.open(img)">
                                <img :src="img" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                            </div>
                        </template>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <a :href="activeItem.links.kako" target="_blank" class="agent-btn btn-kako">
                        <div class="flex items-center gap-4">
                            <img src="https://i.ibb.co/vD7yWdZ/kakobuy-logo.png" class="agent-logo">
                            <span class="text-sm font-black">Order on Kakobuy</span>
                        </div>
                        <i class="fa-solid fa-arrow-right-long opacity-30 text-xs"></i>
                    </a>
                    <a :href="activeItem.links.acb" target="_blank" class="agent-btn btn-acb">
                        <div class="flex items-center gap-4">
                            <img src="https://i.ibb.co/7Xk7H0p/acbuy-logo.png" class="agent-logo">
                            <span class="text-sm font-black">Order on ACBuy</span>
                        </div>
                        <i class="fa-solid fa-arrow-right-long opacity-30 text-xs"></i>
                    </a>
                </div>
            </section>
        </template>
    </main>

    <div x-show="openMenu" class="fixed inset-0 z-[100]" x-cloak>
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" @click="openMenu = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:w-[400px] menu-sidebar p-8 shadow-2xl overflow-y-auto" x-transition>
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-3xl font-black uppercase tracking-tighter">MENU</h2>
                <button @click="openMenu = false" class="w-10 h-10 bg-white/5 rounded-xl hover:bg-red-600 transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="space-y-4 mb-10">
                <p class="text-[10px] font-black text-gray-600 tracking-widest uppercase mb-4">Główne</p>
                <div @click="view = 'products'; openMenu = false" class="menu-tile">
                    <div class="flex items-center gap-4">
                        <div class="menu-icon-box"><i class="fa-solid fa-magnifying-glass"></i></div>
                        <span class="font-bold uppercase text-sm">Browse Finds</span>
                    </div>
                </div>
                <div @click="view = 'converter'; openMenu = false" class="menu-tile border-red-600/30 bg-red-600/5">
                    <div class="flex items-center gap-4">
                        <div class="menu-icon-box !text-red-500"><i class="fa-solid fa-robot"></i></div>
                        <span class="font-bold uppercase text-sm">Product Engine</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function siteHandler() {
            return {
                view: 'home', openMenu: false, lang: 'pl', currency: 'PLN', inputUrl: '', activeItem: null,
                discordLink: 'https://discord.gg/DTb5mkpNuH',
                aff: { kakobuy: 'maksr3ps', usfans: 'DJPZ6T', acbuy: 'KV2WLD' },
                t: {},
                translations: {
                    pl: {
                        heroTitle: 'THE ULTIMATE<br><span class="text-red-600">REP</span> COMMUNITY',
                        heroSub: 'Najlepsze znaleziska, sprawdzeni agenci i największa społeczność.',
                        browseBtn: 'Przeglądaj Produkty',
                        convDesc: 'Wklej link, aby zobaczyć detale Versace i zdjęcia QC.',
                        convPlace: 'Wklej link Taobao/Weidian...'
                    }
                },
                init() { this.t = this.translations.pl; },

                processLink() {
                    let url = this.inputUrl.trim();
                    if (!url) return;

                    let id = "N/A";
                    if (url.includes("id=")) { id = url.match(/id=(\d+)/)[1]; }

                    // Symulacja danych na podstawie zdjęć cadenreps
                    this.activeItem = {
                        id: id,
                        name: "VERSACE MEDUSA HEAD BAROQUE SILK SHIRT",
                        shopName: "AAAAJERSEY 4 FRANCE",
                        price: "15.91",
                        weight: "242",
                        sales: "11",
                        mainImg: "https://file.uufinds.com/product/2024/05/10/2c92808a9d6ac29f019d8fffa56c38c0.webp",
                        sizes: ["S (+ world cup 2 Badges)", "S (No Badge)", "M (+ world cup 2 Badges)", "M (No Badge)", "L (+ world cup 2 Badges)", "XL", "2XL", "3XL", "4XL"],
                        versions: ["away: MBAPPE #10", "away: GRIEZMANN #7", "away: TCHOUAMENI #8", "away: CAMAVINGA #6", "away: OLISE #11", "away: UPAMECANO #4"],
                        qcImages: [
                            "https://file.uufinds.com/qc/1.jpg", "https://file.uufinds.com/qc/2.jpg",
                            "https://file.uufinds.com/qc/3.jpg", "https://file.uufinds.com/qc/4.jpg",
                            "https://file.uufinds.com/qc/5.jpg", "https://file.uufinds.com/qc/6.jpg",
                            "https://file.uufinds.com/qc/7.jpg", "https://file.uufinds.com/qc/8.jpg"
                        ],
                        links: {
                            kako: `https://www.kakobuy.com/item/details?url=${encodeURIComponent(url)}&affcode=${this.aff.kakobuy}`,
                            usf: `https://www.usfans.com/product/1/${id}?ref=${this.aff.usfans}`,
                            acb: `https://m.acbuy.com/product?id=${id}&source=TB&inviteCode=${this.aff.acbuy}`
                        }
                    };

                    this.view = 'product';
                    this.inputUrl = '';
                },
                copyLink() {
                    navigator.clipboard.writeText(window.location.href);
                    alert("Skopiowano link!");
                }
            }
        }
    </script>
</body>
</html>
