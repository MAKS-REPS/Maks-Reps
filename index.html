<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maks Reps | Premium Tools</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
body { font-family: 'Inter'; background:#000; color:white; }

.hero-title { font-size:48px; font-weight:900; }
.btn-main-red { background:#ff0000; padding:14px; border-radius:12px; font-weight:800; }
.menu-tile { background:#111; padding:16px; border-radius:16px; cursor:pointer; }
.menu-tile:hover { background:#1a1a1a; }
</style>
</head>

<body x-data="site()">

<nav class="p-6 flex justify-between bg-black border-b border-white/10">
<div class="font-black text-xl cursor-pointer" @click="view='home'">MAKS REPS</div>
<button @click="menu=true"><i class="fa-solid fa-bars"></i></button>
</nav>

<main class="p-10">

<!-- HOME -->
<div x-show="view==='home'">
<h1 class="hero-title">MAKS REPS</h1>
</div>

<!-- PRODUCTS -->
<div x-show="view==='products'">Produkty</div>

<!-- CONVERTER -->
<div x-show="view==='converter'" class="max-w-xl mx-auto">

<input x-model="inputUrl" @input="convertLink()" placeholder="Wklej link..."
class="w-full p-5 bg-black border border-white/20 rounded mb-5">

<div x-show="botResult">
<p class="text-gray-400 mb-4" x-text="botResult.cleanUrl"></p>

<a :href="botResult.kako" target="_blank" class="btn-main-red block mb-2">Kakobuy</a>
<a :href="botResult.usf" target="_blank" class="block mb-2 bg-blue-500 p-4 rounded">USFans</a>
<a :href="botResult.acb" target="_blank" class="block mb-2 bg-green-400 text-black p-4 rounded">ACBuy</a>
</div>

</div>

<!-- QC -->
<div x-show="view==='qc'">QC</div>

<!-- SHIP -->
<div x-show="view==='ship'" class="max-w-xl mx-auto">

<h2 class="text-2xl mb-5">Ship Calculator</h2>

<input type="number" x-model="shipWeight" placeholder="Waga (kg)"
class="w-full p-4 mb-3 bg-black border border-white/20 rounded">

<select x-model="shipMethod" class="w-full p-4 mb-3 bg-black border border-white/20 rounded">
<option value="air">Air</option>
<option value="sea">Sea</option>
</select>

<p class="text-xl mt-4" x-text="calculateShip()"></p>

</div>

<!-- TRACKER -->
<div x-show="view==='tracker'" class="max-w-xl mx-auto">

<h2 class="text-2xl mb-5">Tracker</h2>

<input x-model="trackingNumber" placeholder="Numer paczki"
class="w-full p-4 mb-5 bg-black border border-white/20 rounded">

<a :href="'https://17track.net/en/track#nums=' + trackingNumber"
target="_blank"
class="btn-main-red block text-center"
x-show="trackingNumber">
Śledź paczkę
</a>

</div>

</main>

<!-- MENU -->
<div x-show="menu" class="fixed inset-0 bg-black/80 p-10">

<div class="space-y-4">

<div class="menu-tile" @click="view='products'; menu=false">Produkty</div>
<div class="menu-tile" @click="view='converter'; menu=false">Converter</div>
<div class="menu-tile" @click="view='qc'; menu=false">QC</div>

<div class="menu-tile" @click="view='ship'; menu=false">Ship Calculator</div>
<div class="menu-tile" @click="view='tracker'; menu=false">Tracker</div>

</div>

</div>

<script>
function site(){
return{

view:'home',
menu:false,

inputUrl:'',
botResult:null,

shipWeight:1,
shipMethod:'air',

trackingNumber:'',

aff:{
kakobuy:'maksr3ps',
usfans:'DJPZ6T',
acbuy:'KV2WLD'
},

convertLink(){
let url=this.inputUrl.toLowerCase()
let id='',type='1',source='TB',clean=url

if(url.includes('taobao')||url.includes('tmall')){
let m=url.match(/id=(\d+)/)
if(m){id=m[1];clean=`https://item.taobao.com/item.htm?id=${id}`}
}

else if(url.includes('weidian')){
let m=url.match(/(?:itemid|item_id|itemID=)(\d+)/)
if(m){id=m[1];clean=`https://weidian.com/item.html?itemID=${id}`;source='WD'}
}

else if(url.includes('1688')){
let m=url.match(/(\d+)/)
if(m){id=m[1];type='2';source='1688';clean=`https://detail.1688.com/offer/${id}.html`}
}

if(id){
let encoded=encodeURIComponent(clean)

this.botResult={
cleanUrl:clean,
kako:`https://www.kakobuy.com/item/details?url=${encoded}&affcode=${this.aff.kakobuy}`,
usf:`https://www.usfans.com/product/${type}/${id}?inviteCode=${this.aff.usfans}`,
acb:`https://m.acbuy.com/product?id=${id}&source=${source}&inviteCode=${this.aff.acbuy}`
}
}
},

calculateShip(){
if(!this.shipWeight) return "0 PLN"

let price = this.shipMethod==='air'
? 50 + (this.shipWeight*25)
: 30 + (this.shipWeight*10)

return price.toFixed(2)+" PLN"
}

}
}
</script>

</body>
</html>
