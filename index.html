<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Najlepsze Znaleziska</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
        .btn-animate { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-animate:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <h1 class="text-3xl font-extrabold tracking-tighter text-blue-500">MAKS <span class="text-white">REPS</span></h1>
        
        <div class="flex gap-4">
            <a href="LINK_DO_DISCORDA" class="glass px-6 py-2 rounded-full flex items-center gap-2 hover:bg-blue-600 btn-animate">
                <i class="fab fa-discord"></i> Community
            </a>
            <a href="https://www.usfans.com/register?ref=DJPZ6T" class="bg-blue-600 px-6 py-2 rounded-full flex items-center gap-2 hover:bg-blue-700 btn-animate font-bold">
                <i class="fas fa-shopping-cart"></i> Agent Link
            </a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto mb-10">
        <input type="text" placeholder="Szukaj produktów (np. Jordan, Trapstar...)" 
               class="w-full p-4 rounded-2xl glass focus:outline-none focus:ring-2 focus:ring-blue-500 mb-6">
        
        <div class="flex gap-3 overflow-x-auto pb-2">
            <button class="bg-blue-600 px-5 py-2 rounded-xl whitespace-nowrap">Wszystko</button>
            <button class="glass px-5 py-2 rounded-xl whitespace-nowrap hover:bg-white/10">Buty</button>
            <button class="glass px-5 py-2 rounded-xl whitespace-nowrap hover:bg-white/10">Bluzy</button>
            <button class="glass px-5 py-2 rounded-xl whitespace-nowrap hover:bg-white/10">Akcesoria</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        
        <div class="glass p-4 rounded-3xl product-card">
            <div class="h-48 w-full bg-gray-800 rounded-2xl mb-4 overflow-hidden">
                <img src="https://via.placeholder.com/300" alt="Produkt" class="w-full h-full object-cover">
            </div>
            <h3 class="font-semibold text-lg mb-1">Jordan 4 Black Cat</h3>
            <p class="text-blue-400 font-bold mb-4">240 CNY (~140 PLN)</p>
            <div class="flex flex-col gap-2">
                <a href="https://www.usfans.com/register?ref=DJPZ6T" class="w-full py-2 bg-white text-black text-center rounded-xl font-bold hover:bg-gray-200 btn-animate">KUP TERAZ</a>
                <a href="LINK_QC" class="w-full py-2 text-center text-sm text-gray-400 hover:text-white">Zobacz QC</a>
            </div>
        </div>
        </div>

    <footer class="text-center mt-20 text-gray-500 text-sm">
        <p>&copy; 2026 Maks Reps. Strona stworzona dla społeczności.</p>
    </footer>

</body>
</html>
