<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Finds</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        .red-glow-btn {
            background-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .menu-card {
            background: #111;
            border: 1px solid #1a1a1a;
            cursor: pointer;
        }

        .menu-card:hover {
            background: #161616;
        }

        .icon-box {
            background: #1a1a1a;
            width: 40px;
            height: 40px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:10px;
        }

        [x-cloak] { display: none !important; }
    </style>
</head>

<body x-data="siteHandler()">

<!-- NAV -->
<nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 border-b border-white/5">
    <div class="text-2xl font-black cursor-pointer" @click="view='home'">
        MAKS<span class="text-red-600">REPS</span>
    </div>

    <button @click="openMenu=true">
        <i class="fa-solid fa-bars text-xl"></i>
    </button>
</nav>

<main class="pt-32 px-6">

    <!-- HOME -->
    <template x-if="view==='home'">
        <div class="text-center mt-20">
            <h1 class="text-6xl font-black">Maks Reps</h1>
            <p class="text-gray-500 mt-4">Premium Finds & Tools</p>
        </div>
    </template>

    <!-- PRODUCTS -->
    <template x-if="view==='products'">
        <div class="mt-10">Products page</div>
    </template>

    <!-- TOOLS -->
    <template x-if="view==='tools'">
        <div class="max-w-2xl mx-auto space-y-6 mt-10">

            <h1 class="text-3xl font-black">TOOLS</h1>

            <!-- LINK CONVERTER -->
            <div class="menu-card p-5 rounded-2xl">
                <h2 class="font-bold mb-3">🔗 Link Converter</h2>

                <input x-model="link" placeholder="Wklej link"
                    class="w-full p-3 bg-black border border-white/10 rounded-xl">

                <button @click="convert()"
                    class="red-glow-btn w-full mt-3 p-3 rounded-xl font-bold">
                    Konwertuj
                </button>

                <div class="text-sm text-gray-400 mt-3" x-html="result"></div>
            </div>

            <!-- SHIPPING -->
            <div class="menu-card p-5 rounded-2xl">
                <h2 class="font-bold mb-3">📦 Shipping Calculator</h2>

                <input type="number" x-model="weight" placeholder="Waga (kg)"
                    class="w-full p-3 bg-black border border-white/10 rounded-xl">

                <button @click="shipping()"
                    class="red-glow-btn w-full mt-3 p-3 rounded-xl font-bold">
                    Oblicz
                </button>

                <div class="mt-4 text-sm" x-html="shipResult"></div>
            </div>

        </div>
    </template>

</main>

<!-- MENU -->
<div x-show="openMenu" class="fixed inset-0 bg-black/80" x-cloak>
    <div class="absolute right-0 top-0 w-80 h-full bg-[#0b0b0b] p-6">

        <div class="flex justify-between mb-6">
            <h2 class="font-black">MENU</h2>
            <button @click="openMenu=false">✖</button>
        </div>

        <div class="space-y-3">

            <div class="menu-card p-4 rounded-xl" @click="view='home'; openMenu=false">
                Home
            </div>

            <div class="menu-card p-4 rounded-xl" @click="view='products'; openMenu=false">
                Products
            </div>

            <div class="menu-card p-4 rounded-xl" @click="view='tools'; openMenu=false">
                Tools
            </div>

        </div>
    </div>
</div>

<script>
function siteHandler() {
    return {
        view: 'home',
        openMenu: false,

        link: '',
        result: '',
        weight: 0,
        shipResult: '',

        convert() {
            try {
                let url = new URL(this.link);
                let id = url.pathname.split('/').filter(Boolean).pop();

                if (url.hostname.includes("weidian.com")) {
                    id = url.searchParams.get("id");
                }

                if (!id) {
                    this.result = "❌ Nie rozpoznano linku";
                    return;
                }

                this.result = `
                <b>ID:</b> ${id}<br><br>
                USFans: https://usfans.com/product/${id}<br>
                ACBuy: https://acbuy.com/item/${id}
                `;
            } catch {
                this.result = "❌ Błędny link";
            }
        },

        shipping() {
            let w = parseFloat(this.weight);

            if (!w) {
                this.shipResult = "Podaj wagę";
                return;
            }

            let data = [
                {name:"USFans DPD", price:(w*9+7)},
                {name:"Kakobuy DPD", price:(w*10+8)},
                {name:"USFans DHL", price:(w*11+9)},
                {name:"Kakobuy DHL", price:(w*12+10)}
            ];

            data.sort((a,b)=>a.price-b.price);

            this.shipResult =
                "<b>Ranking wysyłki:</b><br>" +
                data.map((x,i)=> `#${i+1} ${x.name} - $${x.price.toFixed(2)}`).join("<br>");
        }
    }
}
</script>

</body>
</html>
