<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Finds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #080808; color: white; overflow-x: hidden; }
        .red-glow { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .btn-smooth { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-smooth:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        
        /* Styl przycisków agentów ze zdjęcia */
        .btn-kakobuy { background-color: #ff5c5c; color: white; border-radius: 12px; font-weight: 700; }
        .btn-usfans { background-color: #3b82f6; color: white; border-radius: 12px; font-weight: 700; }
        .logo-k { font-family: 'serif'; font-style: italic; font-weight: 900; margin-right: 4px; }
        .logo-us { border: 1.5px solid white; padding: 0 4px; border-radius: 4px; font-size: 0.7rem; margin-right: 4px; font-weight: 800; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-4 flex justify-between items-center bg-black/60 backdrop-blur-lg border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            Maks<span class="text-red-600">Reps</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button @click="openMenu = true" class="p-2 hover:bg-white/10 rounded-lg transition">
                <i class="fa-solid fa-bars-staggered text-xl"></i>
            </button>
            <a href="https://discord.gg/DTb5mkpNuH" target="_blank" class="hidden md:block bg-red-600 px-6 py-2 rounded-full font-bold red-glow btn-smooth">Discord</a>
        </div>
    </nav>

    <main class="min-h-screen pt-24">
        
        <template x-if="view === 'home'">
            <section x-transition class="flex flex-col items-center justify-center text-center px-4 py-32">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-red-900/10 via-transparent to-transparent -z-10"></div>
                <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tight uppercase" x-text="t.heroTitle"></h1>
                <p class="max-w-xl text-gray-400 text-lg mb-10" x-text="t.heroSub"></p>
                <div class="flex flex-col md:flex-row gap-4">
                    <button @click="view = 'products'" class="bg-red-600 px-12 py-4 rounded-xl font-extrabold text-lg red-glow btn-smooth uppercase" x-text="t.browseBtn"></button>
                    <a href="https://discord.gg/DTb5mkpNuH" target="_blank" class="glass-card px-12 py-4 rounded-xl font-extrabold text-lg btn-smooth border border-white/10 flex items-center justify-center uppercase" x-text="t.joinBtn"></a>
                </div>
            </section>
        </template>

        <template x-if="view === 'products'">
            <section x-transition class="max-w-7xl mx-auto px-6 pb-20">
                <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                    <div>
                        <h2 class="text-4xl font-black uppercase mb-2" x-text="t.productsTitle"></h2>
                        <p class="text-gray-500" x-text="t.productsSub"></p>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-red-600 px-6 py-2 rounded-xl text-sm font-bold btn-smooth">All</button>
                        <button class="glass-card px-6 py-2 rounded-xl text-sm font-bold btn-smooth">Shoes</button>
                        <button class="glass-card px-6 py-2 rounded-xl text-sm font-bold btn-smooth">Apparel</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    <template x-for="product in products" :key="product.id">
                        <div class="glass-card p-5 rounded-[2rem] flex flex-col btn-smooth group">
                            <div class="relative aspect-square mb-5 overflow-hidden rounded-[1.5rem] bg-[#111]">
                                <img :src="product.image" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                                <div class="absolute top-3 right-3 bg-black/70 backdrop-blur-md px-4 py-1.5 rounded-full text-sm font-black text-red-500 border border-white/10" x-text="product.price"></div>
                            </div>
                            
                            <h3 class="font-bold text-xl mb-6 px-2 truncate" x-text="product.name"></h3>
                            
                            <div class="space-y-3 px-1">
                                <p class="text-[11px] text-gray-500 uppercase font-black tracking-[0.15em] mb-2">Select Agent</p>
                                <div class="grid grid-cols-2 gap-3">
                                    <a :href="product.kakobuy" target="_blank" class="btn-kakobuy btn-smooth py-3 flex items-center justify-center text-sm">
                                        <span class="logo-k">K</span> Kakobuy
                                    </a>
                                    <a :href="product.usfans" target="_blank" class="btn-usfans btn-smooth py-3 flex items-center justify-center text-sm uppercase">
                                        <span class="logo-us">US</span> Fans
                                    </a>
                                </div>
                                <a :href="product.qc" target="_blank" class="block w-full text-center py-3 mt-2 text-xs font-bold text-gray-400 hover:text-white transition">View QC Photos</a>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </template>
    </main>

    <div x-show="openMenu" class="fixed inset-y-0 right-0 w-full md:w-96 bg-[#0a0a0a] z-[60] p-8 shadow-2xl border-l border-white/5" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black uppercase">Menu</h2>
            <button @click="openMenu = false" class="w-12 h-12 flex items-center justify-center glass-card rounded-xl">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="space-y-4">
            <template x-for="item in menuItems">
                <button @click="view = item.view; openMenu = false" class="w-full flex items-center justify-between p-5 glass-card rounded-2xl btn-smooth group">
                    <div class="flex items-center gap-4">
                        <i :class="item.icon" class="text-xl text-gray-400 group-hover:text-red-500 transition"></i>
                        <span class="font-bold text-lg" x-text="item.label[lang]"></span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-xs text-gray-600"></i>
                </button>
            </template>
        </div>
        
        <div class="mt-12 border-t border-white/5 pt-8">
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-6">Settings</p>
            
            <div class="glass-card p-5 rounded-2xl space-y-6">
                <div class="flex justify-between items-center">
                    <span class="font-bold">Language</span>
                    <div class="flex gap-3">
                        <button @click="setLang('en')" class="btn-smooth p-1.5 rounded-lg border-2" :class="lang === 'en' ? 'border-red-600 bg-red-600/10' : 'border-transparent'">
                            <img src="https://flagcdn.com/w40/gb.png" class="w-7 rounded-sm">
                        </button>
                        <button @click="setLang('pl')" class="btn-smooth p-1.5 rounded-lg border-2" :class="lang === 'pl' ? 'border-red-600 bg-red-600/10' : 'border-transparent'">
                            <img src="https://flagcdn.com/w40/pl.png" class="w-7 rounded-sm">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="openMenu" @click="openMenu = false" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[55]" x-cloak></div>

    <script>
        function siteHandler() {
            return {
                view: 'home',
                openMenu: false,
                lang: 'pl',
                t: {},
                products: [
                    {
                        id: 1,
                        name: "Numeris",
                        price: "180 PLN",
                        image: "https://cdn.discordapp.com/attachments/1492248410969870417/1494820684285608097/pcitem1238871281-06220000019a9e195a380a23041a-unadjust_1080_1080.png?ex=69e3ffbf&is=69e2ae3f&hm=779babd2c46013c3c41f29883279209e26fbce81363ef2066f2d3c70b3d28274&", // Tutaj wstaw link do zdjęcia butów Numeris
                        kakobuy: "https://www.kakobuy.com/item/details?url=https%3A%2F%2Fweidian.com%2Fitem.html%3FitemID%3D7614479098&affcode=maksr3ps",
                        usfans: "https://www.usfans.com/product/3/7614479098/?ref=DJPZ6T",
                        qc: "#"
                    },
                    {
                        id: 2,
                        name: "Dresy ADWYSD",
                        price: "44 PLN",
                        image: "https://cdn.discordapp.com/attachments/1492248410969870417/1494820675955720292/IMG_2193.png?ex=69e3ffbd&is=69e2ae3d&hm=1be0423b171ceb5801b8f7e475a6c95afcb0a7ac93634633e19b88d19889cb6b&",
                        kakobuy: "https://ikako.vip/ejqfc",
                        usfans: "https://www.usfans.com/product/2/915690707683/?ref=DJPZ6T",
                        qc: "#"
                    }
                ],
                translations: {
                    pl: {
                        heroTitle: 'Maks Reps Community',
                        heroSub: ' Najlepsze znaleziska od sprawdzonych sprzedawców.',
                        browseBtn: 'Przeglądaj Produkty',
                        joinBtn: 'Dołącz do nas',
                        productsTitle: 'Nasze Znaleziska',
                        productsSub: 'Wybierz swojego agenta i kupuj bezpiecznie.'
                    },
                    en: {
                        heroTitle: 'Maks Reps Community',
                        heroSub: ' Best finds from trusted sellers only.',
                        browseBtn: 'Browse Products',
                        joinBtn: 'Join Us',
                        productsTitle: 'Browse Finds',
                        productsSub: 'Pick your agent and shop safely.'
                    }
                },
                menuItems: [
                    { label: {pl: 'Start', en: 'Home'}, icon: 'fa-solid fa-house', view: 'home' },
                    { label: {pl: 'Produkty', en: 'Products'}, icon: 'fa-solid fa-magnifying-glass', view: 'products' },
                    { label: {pl: 'Discord', en: 'Discord'}, icon: 'fa-brands fa-discord', view: 'home' }
                ],
                init() { this.t = this.translations[this.lang]; },
                setLang(l) { this.lang = l; this.t = this.translations[l]; }
            }
        }
    </script>
</body>
</html>
